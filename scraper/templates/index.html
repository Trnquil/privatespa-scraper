<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrivateSpa Scraper</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>PrivateSpa Scraper</h1>
        <p>
          Scrape a new spa from a URL, or select an existing spa from Firestore
          to edit.
        </p>
      </header>

      <section class="spa-library">
        <div class="spa-library-header">
          <h2>Existing spas</h2>
          <button type="button" id="refresh-spas-btn" class="secondary-btn">
            Refresh
          </button>
        </div>
        <div id="spa-list-status" class="status hidden"></div>
        <div id="spa-list" class="spa-list"></div>
      </section>

      <section class="scrape-section">
        <h2>Scrape new spa</h2>
        <form id="scrape-form" class="url-form">
          <input
            type="text"
            id="url-input"
            placeholder="laspasuite.ch"
            required
            autocomplete="url"
          />
          <button type="submit" id="scrape-btn">Scrape</button>
        </form>
      </section>

      <div id="status" class="status hidden"></div>
    </div>

    <script src="/static/home.js"></script>
  </body>
</html>
